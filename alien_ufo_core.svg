<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <defs>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="core-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <radialGradient id="ufo-bg" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1b0b2e" />
      <stop offset="70%" stop-color="#05020a" />
      <stop offset="100%" stop-color="#020105" />
    </radialGradient>
  </defs>

  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spin-rev { 100% { transform: rotate(-360deg); } }
    @keyframes pulse-core { 0%, 100% { r: 15; fill: #a855f7; } 50% { r: 25; fill: #d946ef; } }
    @keyframes hover { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    @keyframes glitch { 0%, 100% { opacity: 1; } 95% { opacity: 0.2; } 96% { opacity: 1; transform: translateX(2px); } 98% { transform: translateX(-2px); } }
    
    .ring-slow { animation: spin 12s linear infinite; transform-origin: 130px 130px; }
    .ring-med { animation: spin-rev 8s linear infinite; transform-origin: 130px 130px; }
    .ring-fast { animation: spin 4s linear infinite; transform-origin: 130px 130px; }
    .ufo-body { animation: hover 4s ease-in-out infinite; transform-origin: 130px 130px; }
    .core { animation: pulse-core 2s ease-in-out infinite; }
    .glitch-text { animation: glitch 3s infinite; font-family: 'Fira Code', monospace; font-size: 10px; font-weight: bold; fill: #39ff14; }
  </style>

  <!-- Deep Space / Alien Nebula Background -->
  <rect width="100%" height="100%" fill="url(#ufo-bg)" rx="12"/>
  
  <!-- Ambient Grid -->
  <path d="M0 65 H260 M0 130 H260 M0 195 H260 M65 0 V260 M130 0 V260 M195 0 V260" stroke="#39ff14" stroke-width="0.5" opacity="0.1"/>

  <g class="ufo-body">
    <!-- Outer Alien Glyphs / Rings -->
    <circle cx="130" cy="130" r="110" fill="none" stroke="#a855f7" stroke-width="1" class="ring-slow" stroke-dasharray="10 5 30 15 50 20" filter="url(#glow-purple)" opacity="0.6"/>
    
    <g class="ring-med" filter="url(#glow-green)">
      <circle cx="130" cy="130" r="90" fill="none" stroke="#39ff14" stroke-width="2" stroke-dasharray="2 10 40 20"/>
      <!-- Triangle Nodes on Ring -->
      <polygon points="130,35 125,45 135,45" fill="#39ff14" />
      <polygon points="130,225 125,215 135,215" fill="#39ff14" />
      <polygon points="35,130 45,125 45,135" fill="#39ff14" />
      <polygon points="225,130 215,125 215,135" fill="#39ff14" />
    </g>

    <!-- Inner Complex UFO Geometric Core -->
    <g class="ring-fast">
      <circle cx="130" cy="130" r="65" fill="none" stroke="#d946ef" stroke-width="3" stroke-dasharray="70 30" filter="url(#glow-purple)"/>
      <path d="M 130 65 L 186 97 L 186 162 L 130 195 L 74 162 L 74 97 Z" fill="rgba(168, 85, 247, 0.1)" stroke="#39ff14" stroke-width="1.5" filter="url(#glow-green)"/>
      <path d="M 130 65 L 130 195 M 74 97 L 186 162 M 74 162 L 186 97" stroke="#39ff14" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
    </g>

    <!-- Pulsing Energy Core -->
    <circle cx="130" cy="130" r="15" fill="#a855f7" class="core" filter="url(#core-glow)"/>
    
    <!-- Alien Floating Runes/Data -->
    <path d="M 80 80 L 90 70 L 100 80" stroke="#00f2fe" fill="none" stroke-width="2" opacity="0.8"/>
    <path d="M 160 180 L 170 190 L 180 180" stroke="#00f2fe" fill="none" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- Glitch overlay text -->
  <text x="10" y="245" class="glitch-text" filter="url(#glow-green)">> ALIEN_ENTITY_DETECTED</text>
  <text x="175" y="15" class="glitch-text" fill="#d946ef" filter="url(#glow-purple)">UFO.SYS.v9</text>
  
  <!-- Scan line -->
  <line x1="0" y1="0" x2="260" y2="0" stroke="rgba(57, 255, 20, 0.3)" stroke-width="2">
     <animateTransform attributeName="transform" type="translate" values="0,0; 0,260; 0,0" dur="2s" repeatCount="indefinite" />
  </line>
</svg>
