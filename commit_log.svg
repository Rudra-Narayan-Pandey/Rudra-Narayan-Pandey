<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
    <linearGradient id="fade-mask" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="15%" stop-color="white" />
      <stop offset="85%" stop-color="white" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
    <mask id="fade">
      <rect width="100%" height="100%" fill="url(#fade-mask)" />
