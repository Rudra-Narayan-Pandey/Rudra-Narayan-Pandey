<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
    <linearGradient id="fade-mask" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="15%" stop-color="white" />
      <stop offset="85%" stop-color="white" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
    <mask id="fade">
      <rect width="100%" height="100%" fill="url(#fade-mask)" />
    </mask>
  </defs>

  <style>
    @keyframes scroll {
      0% { transform: translateY(250px); }
      100% { transform: translateY(-300px); }
    }
    .scroller { animation: scroll 15s linear infinite; }
    .commit-text { font-family: 'Fira Code', monospace; font-size: 13px; font-weight: 600; }
    .hash { fill: #3b82f6; }
    .branch { fill: #ef4444; }
    .msg { fill: #e2e8f0; }
  </style>

  <!-- Deep Blue Background with Red Border -->
  <rect width="100%" height="100%" fill="rgba(10, 25, 47, 0.8)" rx="10" stroke="#ef4444" stroke-width="2"/>
  
  <text x="20" y="30" font-family="'Fira Code', monospace" font-size="14" fill="#ef4444" font-weight="900" letter-spacing="1" filter="url(#glow-red)">peter@spider-os:~/web_net$ tail -f /var/log/spider_sense.log</text>
  <line x1="20" y1="40" x2="780" y2="40" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

  <!-- Scrolling Area -->
  <g mask="url(#fade)">
    <g class="scroller" transform="translate(20, 0)">
      <text y="50" class="commit-text"><tspan class="hash">70401b6</tspan> <tspan class="branch">(HEAD -> spider_net)</tspan> <tspan class="msg">🕷️ [ROOT.ACCESS] SYSTEM ONLINE. SPIDER-SENSE PROTOCOL ACTIVATED.</tspan></text>
      <text y="75" class="commit-text"><tspan class="hash">7e1a7da</tspan> <tspan class="msg">🕷️ [SYNC] CALIBRATING WEB-SHOOTER FLUID DYNAMICS</tspan></text>
      <text y="100" class="commit-text"><tspan class="hash">b21c953</tspan> <tspan class="msg">🕷️ [SYS.DEFENSE] ARMING SYMBIOTE COUNTER-MEASURE PROTOCOLS</tspan></text>
      <text y="125" class="commit-text"><tspan class="hash">bc80180</tspan> <tspan class="msg">🕷️ [UI.RENDER] INITIALIZING HOLOGRAPHIC KAREN INTERFACE</tspan></text>
      <text y="150" class="commit-text"><tspan class="hash">d103085</tspan> <tspan class="msg">🕷️ [AUTH.FORGE] VERIFYING PARKER CREDENTIALS - ACCESS GRANTED</tspan></text>
      <text y="175" class="commit-text"><tspan class="hash">2da98c3</tspan> <tspan class="msg">🕷️ [INJECT] UPLOADING WEB_TRAP_FIRMWARE.BIN TO MAINFRAME</tspan></text>
      <text y="200" class="commit-text"><tspan class="hash">96e3194</tspan> <tspan class="msg">🕷️ [OVERRIDE] BYPASSING OSBORN FIREWALLS via QUANTUM TUNNEL</tspan></text>
      <text y="225" class="commit-text"><tspan class="hash">b785e1d</tspan> <tspan class="msg">🕷️ [NETWORK.UPLINK] ESTABLISHING AVENGER RELAY CONNECTION</tspan></text>
      <text y="250" class="commit-text"><tspan class="hash">c473cf5</tspan> <tspan class="msg">🕷️ [MODULE.LOAD] DECRYPTING MULTIVERSE SECTOR 7G</tspan></text>
      <text y="275" class="commit-text"><tspan class="hash">31fc8ed</tspan> <tspan class="msg">🕷️ [SYS.INIT] BOOT SEQUENCE INITIATED... KAREN ONLINE</tspan></text>
    </g>
  </g>
</svg>
