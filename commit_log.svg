    .hash { fill: #eab308; }
    .branch { fill: #39ff14; }
    .msg { fill: #e2e8f0; }
  </style>

  <rect width="100%" height="100%" fill="rgba(2, 6, 23, 0.8)" rx="10" stroke="#1e3a8a" stroke-width="2"/>
  
