<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="100%" height="280">
  <defs>
    <!-- Cyan glow -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Green glow -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    @keyframes sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(280px); }
    }
    @keyframes terminal-fade-1 {
      0%, 15% { opacity: 0; }
      16%, 100% { opacity: 1; }
    }
    @keyframes terminal-fade-2 {
      0%, 30% { opacity: 0; }
      31%, 100% { opacity: 1; }
    }
    @keyframes terminal-fade-3 {
      0%, 45% { opacity: 0; }
      46%, 100% { opacity: 1; }
    }
    @keyframes terminal-fade-4 {
      0%, 60% { opacity: 0; }
      61%, 100% { opacity: 1; }
    }
    @keyframes terminal-fade-5 {
      0%, 75% { opacity: 0; }
      76%, 100% { opacity: 1; }
    }
    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes matrix-rain {
      0% { stroke-dashoffset: 400; }
      100% { stroke-dashoffset: 0; }
    }
    .sweep-line {
      animation: sweep 8s infinite linear;
      transform-origin: 110px 140px;
    }
    .scan {
      animation: scanline 4s infinite linear;
    }
    .term-1 { animation: terminal-fade-1 8s infinite steps(1); }
    .term-2 { animation: terminal-fade-2 8s infinite steps(1); }
    .term-3 { animation: terminal-fade-3 8s infinite steps(1); }
    .term-4 { animation: terminal-fade-4 8s infinite steps(1); }
    .term-5 { animation: terminal-fade-5 8s infinite steps(1); }
    .cursor { animation: cursor-blink 0.8s infinite; }
    .matrix-line {
      stroke: #00ff00;
      stroke-width: 1.5;
      stroke-dasharray: 40 180;
      animation: matrix-rain 6s infinite linear;
    }
  </style>

  <!-- Deep Hacker Black/Dark-Green Background -->
  <rect width="100%" height="100%" fill="#05080c" rx="10"/>

  <!-- Scanning horizontal line -->
  <line class="scan" x1="0" y1="0" x2="1000" y2="0" stroke="rgba(0, 255, 0, 0.08)" stroke-width="3" />

  <!-- Cyber grid overlay -->
  <path d="M 0 20 H 1000 M 0 40 H 1000 M 0 60 H 1000 M 0 80 H 1000 M 0 100 H 1000 M 0 120 H 1000 M 0 140 H 1000 M 0 160 H 1000 M 0 180 H 1000 M 0 200 H 1000 M 0 220 H 1000 M 0 240 H 1000 M 0 260 H 1000" stroke="#09131e" stroke-width="0.8" />
  <path d="M 20 0 V 280 M 40 0 V 280 M 60 0 V 280 M 80 0 V 280 M 100 0 V 280 M 120 0 V 280 M 140 0 V 280 M 160 0 V 280 M 180 0 V 280 M 200 0 V 280 M 220 0 V 280 M 240 0 V 280 M 260 0 V 280 M 280 0 V 280 M 300 0 V 280 M 320 0 V 280 M 340 0 V 280 M 360 0 V 280 M 380 0 V 280 M 400 0 V 280 M 420 0 V 280 M 440 0 V 280 M 460 0 V 280 M 480 0 V 280 M 500 0 V 280 M 600 0 V 280 M 700 0 V 280 M 800 0 V 280 M 900 0 V 280" stroke="#09131e" stroke-width="0.8" />

  <!-- Falling Matrix Digital Rain (Background details) -->
  <line class="matrix-line" x1="920" y1="0" x2="920" y2="280" opacity="0.3"/>
  <line class="matrix-line" x1="960" y1="30" x2="960" y2="280" opacity="0.15" style="animation-duration: 4s;"/>
  <line class="matrix-line" x1="880" y1="50" x2="880" y2="280" opacity="0.2" style="animation-duration: 8s;"/>

  <!-- Left Side: Interactive Security Radar HUD -->
  <g transform="translate(0, 0)">
    <!-- Radar boundary ring -->
    <circle cx="110" cy="140" r="90" fill="none" stroke="#102a3a" stroke-width="1"/>
    <circle cx="110" cy="140" r="70" fill="none" stroke="#163e56" stroke-width="1"/>
    <circle cx="110" cy="140" r="50" fill="none" stroke="#39ff14" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.5"/>
    <circle cx="110" cy="140" r="30" fill="none" stroke="#163e56" stroke-width="1"/>
    <circle cx="110" cy="140" r="5" fill="#39ff14" filter="url(#glow-green)"/>
    
    <!-- Crosshairs -->
    <line x1="110" y1="40" x2="110" y2="240" stroke="#163e56" stroke-width="0.8"/>
    <line x1="10" y1="140" x2="210" y2="140" stroke="#163e56" stroke-width="0.8"/>
    
    <!-- Sweep scanner line -->
    <line class="sweep-line" x1="110" y1="140" x2="110" y2="50" stroke="#39ff14" stroke-width="2" filter="url(#glow-green)"/>
    <polygon points="110,140 110,50 135,55 155,70 110,140" fill="rgba(57, 255, 20, 0.1)" class="sweep-line"/>

    <!-- Detected Security Threats Nodes -->
    <circle cx="65" cy="90" r="4" fill="#ff3333" filter="url(#glow-cyan)" opacity="0.8">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="180" r="3.5" fill="#00f2fe" filter="url(#glow-cyan)" opacity="0.6">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Right Side: Glowing Hacker Console / Terminal -->
  <!-- Terminal Frame -->
  <rect x="250" y="30" width="600" height="220" fill="rgba(10, 16, 26, 0.9)" stroke="#1a3d54" stroke-width="2" rx="6" />
  
  <!-- Terminal Header / Titlebar -->
  <path d="M 250 36 C 250 32 254 30 258 30 H 842 C 846 30 850 34 850 38 V 60 H 250 Z" fill="#101a24" />
  <circle cx="270" cy="45" r="5" fill="#ff5f56" />
  <circle cx="285" cy="45" r="5" fill="#ffbd2e" />
  <circle cx="300" cy="45" r="5" fill="#27c93f" />
  <text x="325" y="50" font-family="'Fira Code', monospace" font-size="12" fill="#8892b0">root@rudra-security-core: ~</text>

  <!-- Terminal Logs & Inputs -->
  <g transform="translate(270, 75)" font-family="'Fira Code', 'Courier New', monospace" font-size="14" font-weight="700">
    
    <!-- Command 1 -->
    <g class="term-1">
      <text x="0" y="15" fill="#8892b0">rudra@security-node:~$ <tspan fill="#ffffff">whoami</tspan></text>
    </g>

    <!-- Output 1 -->
    <g class="term-2">
      <text x="0" y="38" fill="#39ff14">Rudra Narayan Pandey | B.Tech CSE @ VIT Vellore</text>
    </g>

    <!-- Command 2 -->
    <g class="term-3">
      <text x="0" y="65" fill="#8892b0">rudra@security-node:~$ <tspan fill="#ffffff">./verify_clearance.sh</tspan></text>
    </g>

    <!-- Output 2 -->
    <g class="term-4">
      <text x="0" y="88" fill="#00f2fe">[+] ACCESS GRANTED [Clearance: Level 4 / root]</text>
      <text x="0" y="108" fill="#00f2fe">[+] SECURITY DECK LOADED SUCCESSFUL</text>
    </g>

    <!-- Command 3 / Active Cursor -->
    <g class="term-5">
      <text x="0" y="135" fill="#8892b0">rudra@security-node:~$ <tspan fill="#39ff14">_</tspan></text>
      <rect class="cursor" x="178" y="122" width="8" height="15" fill="#39ff14" />
    </g>

  </g>
</svg>
