<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" width="100%" height="240">
  <defs>
    <!-- Glowing filter effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#9b5de5" />
    </linearGradient>
  </defs>

  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }
    @keyframes typing-1 {
      0%, 9% { width: 0; opacity: 0; }
      10%, 28% { width: 420px; opacity: 1; }
      29%, 100% { width: 0; opacity: 0; }
    }
    @keyframes typing-2 {
      0%, 34% { width: 0; opacity: 0; }
      35%, 58% { width: 550px; opacity: 1; }
      59%, 100% { width: 0; opacity: 0; }
    }
    @keyframes typing-3 {
      0%, 64% { width: 0; opacity: 0; }
      65%, 88% { width: 520px; opacity: 1; }
      89%, 100% { width: 0; opacity: 0; }
    }
    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .floating-logo {
      animation: float 6s infinite ease-in-out;
      transform-origin: 110px 120px;
    }
    .circuit-line {
      stroke: #1c212a;
      stroke-width: 1.5;
      fill: none;
    }
    .typing-text {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-weight: 700;
      white-space: nowrap;
    }
    .t-line1 {
      animation: typing-1 12s infinite;
    }
    .t-line2 {
      animation: typing-2 12s infinite;
    }
    .t-line3 {
      animation: typing-3 12s infinite;
    }
    .cursor {
      animation: cursor-blink 0.8s infinite;
      stroke: #00f2fe;
      stroke-width: 3;
    }
  </style>

  <!-- Deep Cyber Dark Background -->
  <rect width="100%" height="100%" fill="#0d1117" rx="12"/>

  <!-- Futuristic Cyber Grid Overlay -->
  <path d="M 0 30 H 1000 M 0 60 H 1000 M 0 90 H 1000 M 0 120 H 1000 M 0 150 H 1000 M 0 180 H 1000 M 0 210 H 1000" stroke="#161b22" stroke-width="1" />
  <path d="M 50 0 V 240 M 100 0 V 240 M 150 0 V 240 M 200 0 V 240 M 250 0 V 240 M 300 0 V 240 M 350 0 V 240 M 400 0 V 240 M 450 0 V 240 M 500 0 V 240 M 550 0 V 240 M 600 0 V 240 M 650 0 V 240 M 700 0 V 240 M 750 0 V 240 M 800 0 V 240 M 850 0 V 240 M 900 0 V 240 M 950 0 V 240" stroke="#161b22" stroke-width="1" />

  <!-- Background Cyber Circuit Lines -->
  <path class="circuit-line" d="M 200 120 H 280 L 310 150 H 600" />
  <path class="circuit-line" d="M 110 50 V 80 L 140 110 H 260" />
  <path class="circuit-line" d="M 800 40 L 850 90 H 950" stroke-width="1" />
  <path class="circuit-line" d="M 750 200 L 780 170 H 900" stroke-width="1" />

  <!-- Glowing nodes -->
  <circle cx="280" cy="120" r="3" fill="#00f2fe" style="animation: pulse 2s infinite;"/>
  <circle cx="310" cy="150" r="3" fill="#9b5de5" style="animation: pulse 3s infinite;"/>
  <circle cx="850" cy="90" r="2.5" fill="#00f2fe" style="animation: pulse 4s infinite;"/>

  <!-- Left Side: Glowing Security Shield Logo (floating) -->
  <g class="floating-logo">
    <!-- Outer Glow -->
    <path d="M 110 55 L 160 75 V 135 C 160 170 110 195 110 195 C 110 195 60 170 60 135 V 75 Z" fill="none" stroke="#00f2fe" stroke-width="4" filter="url(#glow)" opacity="0.6"/>
    <!-- Inner Shield -->
    <path d="M 110 60 L 155 78 V 132 C 155 163 110 187 110 187 C 110 187 65 163 65 132 V 78 Z" fill="url(#shieldGrad)" opacity="0.85" />
    <!-- Shield Crosshair/Core Details -->
    <path d="M 110 80 V 160 M 80 120 H 140" stroke="#0d1117" stroke-width="2.5" stroke-linecap="round" />
    <circle cx="110" cy="120" r="10" fill="#ffffff" />
    <circle cx="110" cy="120" r="5" fill="#00f2fe" />
  </g>

  <!-- Right Side: Text & Typings -->
  <!-- Name Greeting (Row 1) - NEVER Overlaps -->
  <text x="240" y="105" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#ffffff">
    Hi, I'm <tspan fill="#00f2fe" filter="url(#glow)">Rudra Narayan Pandey</tspan> 👋
  </text>

  <!-- Subtitle Typing Console (Row 2) - Safely Separated Below Name -->
  <g transform="translate(240, 130)">
    <!-- Line 1: Cybersecurity Engineer -->
    <svg width="600" height="50" class="t-line1" style="overflow: hidden; position: absolute;">
      <text x="0" y="32" class="typing-text" font-size="24" fill="#9b5de5">> Cybersecurity Engineer</text>
      <line x1="335" y1="12" x2="335" y2="34" class="cursor" style="stroke: #9b5de5;" />
    </svg>

    <!-- Line 2: DevOps & Cloud Security Specialist -->
    <svg width="600" height="50" class="t-line2" style="overflow: hidden; position: absolute;">
      <text x="0" y="32" class="typing-text" font-size="24" fill="#00f2fe">> DevOps &amp; Cloud Security Specialist</text>
      <line x1="480" y1="12" x2="480" y2="34" class="cursor" />
    </svg>

    <!-- Line 3: B.Tech CSE Student @ VIT Vellore -->
    <svg width="600" height="50" class="t-line3" style="overflow: hidden; position: absolute;">
      <text x="0" y="32" class="typing-text" font-size="24" fill="#9b5de5">> B.Tech CSE @ VIT Vellore</text>
      <line x1="330" y1="12" x2="330" y2="34" class="cursor" style="stroke: #9b5de5;" />
    </svg>
  </g>
</svg>
