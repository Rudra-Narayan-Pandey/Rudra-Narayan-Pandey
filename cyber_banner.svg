<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="100%" height="340">
  <style>
    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes blink {
      50% { stroke: transparent; }
    }
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(15px, -15px) rotate(1deg); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-20px, 10px) rotate(-1deg); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(10px, 20px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
    .floating-g1 {
      animation: float1 12s infinite ease-in-out;
      transform-origin: 180px 150px;
    }
    .floating-g2 {
      animation: float2 15s infinite ease-in-out;
      transform-origin: 800px 130px;
    }
    .floating-g3 {
      animation: float3 18s infinite ease-in-out;
    }
    .typing-text {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-weight: 700;
      white-space: nowrap;
    }
    .line1 {
      animation: type-line1 12s infinite;
    }
    .line2 {
      animation: type-line2 12s infinite;
    }
    .line3 {
      animation: type-line3 12s infinite;
    }
    .cursor {
      animation: cursor-blink 0.8s infinite;
      stroke: #00f2fe;
      stroke-width: 3;
    }
    
    @keyframes type-line1 {
      0% { width: 0; opacity: 0; }
      2% { width: 0; opacity: 1; }
      15%, 28% { width: 400px; opacity: 1; }
      30%, 100% { width: 0; opacity: 0; }
    }
    @keyframes type-line2 {
      0%, 33% { width: 0; opacity: 0; }
      35% { width: 0; opacity: 1; }
      48%, 61% { width: 440px; opacity: 1; }
      63%, 100% { width: 0; opacity: 0; }
    }
    @keyframes type-line3 {
      0%, 66% { width: 0; opacity: 0; }
      68% { width: 0; opacity: 1; }
      81%, 94% { width: 440px; opacity: 1; }
      96%, 100% { width: 0; opacity: 0; }
    }
    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
  
  <!-- Deep Space Dark Background -->
  <rect width="100%" height="100%" fill="#0d1117" rx="10"/>
  
  <!-- Grid overlay -->
  <path d="M0 40 H1000 M0 80 H1000 M0 120 H1000 M0 160 H1000 M0 200 H1000 M0 240 H1000 M0 280 H1000 M0 320 H1000" stroke="#1c212a" stroke-width="1" />
  <path d="M100 0 V340 M200 0 V340 M300 0 V340 M400 0 V340 M500 0 V340 M600 0 V340 M700 0 V340 M800 0 V340 M900 0 V340" stroke="#1c212a" stroke-width="1" />
  
  <!-- Parallax Constellation Layer 1 (floating-g1) -->
  <g class="floating-g1">
    <line x1="80" y1="60" x2="220" y2="100" stroke="rgba(0, 242, 254, 0.2)" stroke-width="1"/>
    <line x1="220" y1="100" x2="150" y2="240" stroke="rgba(0, 242, 254, 0.2)" stroke-width="1"/>
    <line x1="150" y1="240" x2="80" y2="60" stroke="rgba(0, 242, 254, 0.2)" stroke-width="1"/>
    <line x1="220" y1="100" x2="320" y2="60" stroke="rgba(0, 242, 254, 0.1)" stroke-width="1"/>
    
    <circle cx="80" cy="60" r="4" fill="#00f2fe" style="animation: pulse 3s infinite;"/>
    <circle cx="220" cy="100" r="6" fill="#9b5de5" style="animation: pulse 4s infinite;"/>
    <circle cx="150" cy="240" r="5" fill="#00f2fe" style="animation: pulse 5s infinite;"/>
    <circle cx="320" cy="60" r="3" fill="#ffffff" style="animation: pulse 2.5s infinite;"/>
  </g>
  
  <!-- Parallax Constellation Layer 2 (floating-g2) -->
  <g class="floating-g2">
    <line x1="880" y1="70" x2="740" y2="150" stroke="rgba(155, 93, 229, 0.2)" stroke-width="1"/>
    <line x1="740" y1="150" x2="920" y2="220" stroke="rgba(155, 93, 229, 0.2)" stroke-width="1"/>
    <line x1="920" y1="220" x2="880" y2="70" stroke="rgba(155, 93, 229, 0.2)" stroke-width="1"/>
    <line x1="740" y1="150" x2="630" y2="200" stroke="rgba(0, 242, 254, 0.1)" stroke-width="1"/>
    
    <circle cx="880" cy="70" r="6" fill="#9b5de5" style="animation: pulse 4s infinite;"/>
    <circle cx="740" cy="150" r="4" fill="#00f2fe" style="animation: pulse 3s infinite;"/>
    <circle cx="920" cy="220" r="7" fill="#9b5de5" style="animation: pulse 6s infinite;"/>
    <circle cx="630" cy="200" r="3.5" fill="#ffffff" style="animation: pulse 3.5s infinite;"/>
  </g>

  <!-- Parallax Constellation Layer 3 (floating-g3) -->
  <g class="floating-g3">
    <line x1="480" y1="40" x2="580" y2="80" stroke="rgba(255, 255, 255, 0.1)" stroke-width="0.75"/>
    <line x1="580" y1="80" x2="520" y2="140" stroke="rgba(255, 255, 255, 0.1)" stroke-width="0.75"/>
    
    <circle cx="480" cy="40" r="3" fill="#ffffff" style="animation: pulse 2.8s infinite;"/>
    <circle cx="580" cy="80" r="3" fill="#00f2fe" style="animation: pulse 4.2s infinite;"/>
    <circle cx="520" cy="140" r="2.5" fill="#9b5de5" style="animation: pulse 3.1s infinite;"/>
  </g>

  <!-- Waving Hand Emoji -->
  <g transform="translate(180, 145)">
    <image href="https://raw.githubusercontent.com/MartinHeinz/MartinHeinz/master/wave.gif" width="48" height="48" />
  </g>

  <!-- Title Text -->
  <text x="245" y="178" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#ffffff">
    Hi there! I'm
  </text>
  
  <!-- Animated Typing Text Container -->
  <g transform="translate(445, 143)">
    <!-- Line 1 -->
    <svg width="450" height="50" class="line1" style="overflow: hidden; position: absolute;">
      <text x="0" y="35" class="typing-text" font-size="32" fill="#00f2fe">Rudra Narayan Pandey</text>
      <!-- Blinking Cursor -->
      <line x1="380" y1="8" x2="380" y2="38" class="cursor" />
    </svg>
    
    <!-- Line 2 -->
    <svg width="450" height="50" class="line2" style="overflow: hidden; position: absolute;">
      <text x="0" y="35" class="typing-text" font-size="32" fill="#9b5de5">an AI Safety Researcher</text>
      <!-- Blinking Cursor -->
      <line x1="410" y1="8" x2="410" y2="38" class="cursor" style="stroke: #9b5de5;" />
    </svg>
    
    <!-- Line 3 -->
    <svg width="450" height="50" class="line3" style="overflow: hidden; position: absolute;">
      <text x="0" y="35" class="typing-text" font-size="32" fill="#00f2fe">a Multi-Agent Architect</text>
      <!-- Blinking Cursor -->
      <line x1="410" y1="8" x2="410" y2="38" class="cursor" />
    </svg>
  </g>
</svg>
