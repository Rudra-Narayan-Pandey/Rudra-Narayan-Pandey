<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="300">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-red" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff14" />
      <stop offset="50%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#9b5de5" />
    </linearGradient>
  </defs>

  <style>
    @keyframes sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(300px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.95; }
    }
    @keyframes pulse-fast {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.9; }
    }
    /* Oscilloscope pulse line movement */
    @keyframes pulse-flow {
      0% { stroke-dashoffset: 400; }
      100% { stroke-dashoffset: 0; }
    }
    /* Terminal sequence animation keys */
    @keyframes line-1 { 0%, 5% { opacity: 0; } 6%, 100% { opacity: 1; } }
    @keyframes line-2 { 0%, 15% { opacity: 0; } 16%, 100% { opacity: 1; } }
    @keyframes line-3 { 0%, 25% { opacity: 0; } 26%, 100% { opacity: 1; } }
    @keyframes line-4 { 0%, 35% { opacity: 0; } 36%, 100% { opacity: 1; } }
    @keyframes line-5 { 0%, 48% { opacity: 0; } 49%, 100% { opacity: 1; } }
    @keyframes line-6 { 0%, 60% { opacity: 0; } 61%, 100% { opacity: 1; } }
    @keyframes line-7 { 0%, 75% { opacity: 0; } 76%, 100% { opacity: 1; } }
    @keyframes line-8 { 0%, 88% { opacity: 0; } 89%, 100% { opacity: 1; } }
    @keyframes cursor-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    .radar-sweep {
      animation: sweep 9s infinite linear;
      transform-origin: 120px 150px;
    }
    .scanline-trigger {
      animation: scanline 5s infinite linear;
    }
    .scope-line {
      stroke-dasharray: 20 180;
      animation: pulse-flow 4s infinite linear;
    }
    .matrix-col {
      stroke: #39ff14;
      stroke-dasharray: 30 150;
      animation: pulse-flow 5s infinite linear;
    }
    .t1 { animation: line-1 14s infinite steps(1); }
    .t2 { animation: line-2 14s infinite steps(1); }
    .t3 { animation: line-3 14s infinite steps(1); }
    .t4 { animation: line-4 14s infinite steps(1); }
    .t5 { animation: line-5 14s infinite steps(1); }
    .t6 { animation: line-6 14s infinite steps(1); }
    .t7 { animation: line-7 14s infinite steps(1); }
    .t8 { animation: line-8 14s infinite steps(1); }
    .cursor-active { animation: cursor-blink 0.8s infinite; }
  </style>

  <!-- Deep Tactical Black Background -->
  <rect width="100%" height="100%" fill="#05080c" rx="12"/>

  <!-- Scanning horizontal line -->
  <line class="scanline-trigger" x1="0" y1="0" x2="1000" y2="0" stroke="rgba(57, 255, 20, 0.08)" stroke-width="4" />

  <!-- Cyber grid overlay -->
  <path d="M 0 30 H 1000 M 0 60 H 1000 M 0 90 H 1000 M 0 120 H 1000 M 0 150 H 1000 M 0 180 H 1000 M 0 210 H 1000 M 0 240 H 1000 M 0 270 H 1000" stroke="#09131e" stroke-width="0.8" />
  <path d="M 30 0 V 300 M 60 0 V 300 M 90 0 V 300 M 120 0 V 300 M 150 0 V 300 M 180 0 V 300 M 210 0 V 300 M 240 0 V 300 M 270 0 V 300 M 300 0 V 300 M 670 0 V 300 M 700 0 V 300 M 730 0 V 300 M 760 0 V 300 M 790 0 V 300 M 820 0 V 300 M 850 0 V 300 M 880 0 V 300 M 910 0 V 300 M 940 0 V 300 M 970 0 V 300" stroke="#09131e" stroke-width="0.8" />

  <!-- Background Digital Columns -->
  <line class="matrix-col" x1="685" y1="0" x2="685" y2="300" opacity="0.2"/>
  <line class="matrix-col" x1="975" y1="20" x2="975" y2="300" opacity="0.1" style="animation-duration: 3s;"/>

  <!-- ==================== LEFT PANEL: CYBER RADAR ==================== -->
  <g transform="translate(0, 0)">
    <!-- Radar Grids -->
    <circle cx="120" cy="150" r="100" fill="none" stroke="#102535" stroke-width="1.5"/>
    <circle cx="120" cy="150" r="80" fill="none" stroke="#16384f" stroke-width="1"/>
    <circle cx="120" cy="150" r="60" fill="none" stroke="#1a4663" stroke-dasharray="3 5" stroke-width="1"/>
    <circle cx="120" cy="150" r="40" fill="none" stroke="#16384f" stroke-width="1"/>
    <circle cx="120" cy="150" r="20" fill="none" stroke="#39ff14" stroke-width="0.5" opacity="0.5"/>
    <circle cx="120" cy="150" r="5" fill="#39ff14" filter="url(#glow-green)"/>
    
    <!-- Crosshair Coordinates -->
    <line x1="120" y1="35" x2="120" y2="265" stroke="#16384f" stroke-width="1"/>
    <line x1="5" y1="150" x2="235" y2="150" stroke="#16384f" stroke-width="1"/>
    <path d="M 120 50 L 125 60 H 115 Z M 120 250 L 125 240 H 115 Z" fill="#16384f"/>

    <!-- Sweep Line -->
    <line class="radar-sweep" x1="120" y1="150" x2="120" y2="50" stroke="#39ff14" stroke-width="2" filter="url(#glow-green)"/>
    <polygon points="120,150 120,50 145,55 168,75 120,150" fill="rgba(57, 255, 20, 0.08)" class="radar-sweep"/>

    <!-- HUD Text overlays -->
    <text x="30" y="270" font-family="'Fira Code', monospace" font-size="9" fill="#00f2fe" opacity="0.6">SYS.SCAN: INCR</text>
    <text x="160" y="270" font-family="'Fira Code', monospace" font-size="9" fill="#9b5de5" opacity="0.6">DEG: 144.2°</text>

    <!-- Threat indicators -->
    <circle cx="70" cy="110" r="4" fill="#ff3333" filter="url(#glow-red)" style="animation: pulse-fast 2s infinite;"/>
    <circle cx="170" cy="200" r="3.5" fill="#00f2fe" filter="url(#glow-cyan)" style="animation: pulse 4s infinite;"/>
  </g>

  <!-- ==================== MIDDLE PANEL: TACTICAL TERMINAL ==================== -->
  <!-- Main Window -->
  <rect x="250" y="25" width="410" height="250" fill="rgba(6, 10, 18, 0.95)" stroke="#1c3b53" stroke-width="2" rx="6" />
  
  <!-- Titlebar -->
  <path d="M 250 31 C 250 27 254 25 258 25 H 652 C 656 25 660 29 660 33 V 55 H 250 Z" fill="#0c141d" />
  <circle cx="270" cy="40" r="5" fill="#ff5f56" />
  <circle cx="285" cy="40" r="5" fill="#ffbd2e" />
  <circle cx="300" cy="40" r="5" fill="#27c93f" />
  <text x="325" y="45" font-family="'Fira Code', monospace" font-size="12" fill="#8892b0" font-weight="700">security-console@rudra:~</text>

  <!-- Output Log Lines -->
  <g transform="translate(265, 75)" font-family="'Fira Code', 'Courier New', monospace" font-size="12" font-weight="700">
    <!-- Log 1 -->
    <g class="t1">
      <text x="0" y="15" fill="#8892b0">rudra@core:~$ <tspan fill="#ffffff">./netshield_audit.sh</tspan></text>
    </g>
    <!-- Log 2 -->
    <g class="t2">
      <text x="0" y="35" fill="#39ff14">[+] INITIALIZING NETSHIELD THREAT ID...</text>
    </g>
    <!-- Log 3 -->
    <g class="t3">
      <text x="0" y="55" fill="#ff3333">[ALERT] SUSPICIOUS LOGINS DETECTED</text>
    </g>
    <!-- Log 4 -->
    <g class="t4">
      <text x="0" y="75" fill="#00f2fe">[+] EXEC SUDARSHANA IDS RECON-BLOCK...</text>
    </g>
    <!-- Log 5 -->
    <g class="t5">
      <text x="0" y="95" fill="#39ff14">[SUCCESS] TARGET SECURED. DISMISSED.</text>
    </g>
    <!-- Log 6 -->
    <g class="t6">
      <text x="0" y="125" fill="#8892b0">rudra@core:~$ <tspan fill="#ffffff">git credentials load</tspan></text>
    </g>
    <!-- Log 7 -->
    <g class="t7">
      <text x="0" y="145" fill="#9b5de5">[+] KEY CLEARANCE: OPERATIVE LEVEL 4</text>
      <text x="0" y="165" fill="#9b5de5">[+] ROOT: Rudra Narayan Pandey</text>
    </g>
    <!-- Active Prompt Cursor -->
    <g class="t8" transform="translate(0, 185)">
      <text x="0" y="0" fill="#8892b0">rudra@core:~$ <tspan fill="#39ff14">_</tspan></text>
      <rect class="cursor-active" x="110" y="-12" width="6" height="14" fill="#39ff14" />
    </g>
  </g>

  <!-- ==================== RIGHT PANEL: SYSTEM MONITOR ==================== -->
  <g transform="translate(680, 25)">
    <!-- Frame -->
    <rect x="0" y="0" width="300" height="250" fill="rgba(6, 10, 18, 0.9)" stroke="#1c3b53" stroke-width="2" rx="6" />
    
    <!-- Titlebar -->
    <path d="M 680 31 C 680 27 684 25 688 25 H 972 C 976 25 980 29 980 33 V 55 H 680 Z" fill="#0c141d" transform="translate(-680, -25)"/>
    <text x="15" y="20" font-family="'Outfit', sans-serif" font-size="12" fill="#00f2fe" font-weight="800">SYSTEM DIAGNOSTICS</text>
    <circle cx="280" cy="18" r="4" fill="#39ff14" filter="url(#glow-green)"/>

    <!-- Pulse/Oscilloscope Waveform -->
    <path class="scope-line" d="M 15 65 L 45 65 L 55 45 L 65 85 L 75 65 L 140 65 L 150 40 L 160 90 L 170 65 L 285 65" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
    <text x="15" y="105" font-family="'Fira Code', monospace" font-size="10" fill="#8892b0">HEARTBEAT FREQ: 72 Hz</text>

    <!-- Diagnostics Bars (Animated) -->
    <!-- CPU Bar -->
    <text x="15" y="130" font-family="'Fira Code', monospace" font-size="9" fill="#ffffff">CPU LOAD: 74%</text>
    <rect x="15" y="138" width="265" height="8" fill="#162230" rx="3" />
    <rect x="15" y="138" height="8" fill="#00f2fe" rx="3" filter="url(#glow-cyan)">
      <animate attributeName="width" values="40;220;160;196;120;196" dur="8s" repeatCount="indefinite" />
    </rect>

    <!-- RAM Bar -->
    <text x="15" y="165" font-family="'Fira Code', monospace" font-size="9" fill="#ffffff">RAM ALLOC: 58%</text>
    <rect x="15" y="173" width="265" height="8" fill="#162230" rx="3" />
    <rect x="15" y="173" height="8" fill="#9b5de5" rx="3">
      <animate attributeName="width" values="100;153;120;153;140;153" dur="10s" repeatCount="indefinite" />
    </rect>

    <!-- Security Core Bar -->
    <text x="15" y="200" font-family="'Fira Code', monospace" font-size="9" fill="#ffffff">THREAT ALERT LEVEL: MINIMAL</text>
    <rect x="15" y="208" width="265" height="8" fill="#162230" rx="3" />
    <rect x="15" y="208" height="8" fill="#39ff14" rx="3" filter="url(#glow-green)">
      <animate attributeName="width" values="25;40;30;45;20;25" dur="6s" repeatCount="indefinite" />
    </rect>

    <!-- Status labels -->
    <text x="15" y="235" font-family="'Fira Code', monospace" font-size="10" fill="#39ff14" font-weight="700">SIEM CORE: ACTIVE</text>
    <text x="160" y="235" font-family="'Fira Code', monospace" font-size="10" fill="#00f2fe" font-weight="700">TUNNEL: ENCRYPTED</text>
  </g>
</svg>
