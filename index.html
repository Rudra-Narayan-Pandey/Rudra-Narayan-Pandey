<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <!-- Marked.js for Markdown Rendering -->

  <style>
    :root {
      --bg-dark: #0b0c10;
      --bg-card: #151821;
      --primary: #00f2fe;
      --secondary: #9b5de5;
      --text-main: #f5f6f9;
      --text-muted: #8b949e;
      --border-color: #30363d;
      --glow: rgba(0, 242, 254, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    header {
      background: rgba(21, 24, 33, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-glow {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: var(--primary);
      box-shadow: 0 0 10px var(--primary);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
    }

    button {
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      transition: all 0.3s ease;
      border-radius: 6px;
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      color: #0b0c10;
      border: none;
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(0, 242, 254, 0.05);
    }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar controls */
    .sidebar {
      width: 420px;
      background-color: var(--bg-card);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-header h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      color: var(--text-main);
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, textarea, select {
      width: 100%;
      background-color: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 0.75rem;
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 8px var(--glow);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .editor-section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 1rem;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .editor-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    /* Preview Panel */
    .preview-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-dark);
      height: 100%;
      overflow: hidden;
    }

    .preview-tabs {
      background-color: rgba(21, 24, 33, 0.5);
      border-bottom: 1px solid var(--border-color);
      padding: 0 1.5rem;
      display: flex;
      gap: 1rem;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 1rem 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      position: relative;
    }

    .tab-btn.active {
      color: var(--primary);
      font-weight: 600;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background-color: var(--primary);
      box-shadow: 0 0 10px var(--primary);
    }

    .preview-body {
      flex: 1;
      overflow-y: auto;
      padding: 2.5rem;
      display: flex;
      justify-content: center;
    }

    /* Simulated GitHub Profile Interface */
    .github-profile-simulator {
      width: 100%;
      max-width: 900px;
      background-color: #0d1117; /* GitHub Dark Mode Color */
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 2rem;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    /* Styling within simulated profile to mimic GitHub */
    .gh-markdown-body {
      font-size: 16px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .gh-markdown-body h1, .gh-markdown-body h2, .gh-markdown-body h3 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
      padding-bottom: 0.3em;
      border-bottom: 1px solid #21262d;
      color: #f0f6fc;
    }

    .gh-markdown-body hr {
      height: 0.25em;
      padding: 0;
      margin: 24px 0;
      background-color: #21262d;
      border: 0;
    }

    .gh-markdown-body p {
      margin-top: 0;
      margin-bottom: 16px;
    }

    .gh-markdown-body blockquote {
      padding: 0 1em;
      color: #8b949e;
      border-left: 0.25em solid #30363d;
      margin: 0 0 16px 0;
    }

    .gh-markdown-body ul {
      padding-left: 2em;
      margin-top: 0;
      margin-bottom: 16px;
    }

    .gh-markdown-body a {
      color: #58a6ff;
      text-decoration: none;
    }

    .gh-markdown-body a:hover {
      text-decoration: underline;
    }

    /* Raw Code Panel */
    .raw-code-container {
      display: none;
      width: 100%;
      max-width: 900px;
      background-color: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 1.5rem;
      overflow: auto;
    }

    pre code {
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      color: #e6edf3;
      line-height: 1.6;
    }

    /* Notification toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background-color: var(--primary);
      color: #0b0c10;
      padding: 1rem 2rem;
      border-radius: 6px;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
      transform: translateY(150%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
    }

    .toast.show {
      transform: translateY(0);
    }
  </style>
</head>

    function updatePreview() {
      const markdown = generateMarkdown();
      document.getElementById('rendered-markdown').innerHTML = marked.parse(markdown);
      document.getElementById('raw-markdown-code').textContent = markdown;
    }

    function switchTab(tab) {
      document.getElementById('tab-visual').classList.toggle('active', tab === 'visual');
      document.getElementById('tab-raw').classList.toggle('active', tab === 'raw');
      
      document.getElementById('simulated-view').style.display = tab === 'visual' ? 'block' : 'none';
      document.getElementById('raw-view').style.display = tab === 'raw' ? 'block' : 'none';
    }

    function copyMarkdown() {
      const markdown = generateMarkdown();
      navigator.clipboard.writeText(markdown).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    }
