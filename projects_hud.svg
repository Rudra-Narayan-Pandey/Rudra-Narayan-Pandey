<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="600">
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="4" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
    
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020c1b" />
      <stop offset="100%" stop-color="#0a192f" />
    </linearGradient>
    
    <!-- Clean Geometric Lines -->
    <path id="conn1" d="M 500 300 L 250 150" fill="none"/>
    <path id="conn2" d="M 500 300 L 250 450" fill="none"/>
    <path id="conn3" d="M 500 300 L 750 150" fill="none"/>
    <path id="conn4" d="M 500 300 L 750 450" fill="none"/>
    <path id="conn5" d="M 500 300 L 500 100" fill="none"/>
    
    <!-- Hexagon Grid Pattern -->
    <pattern id="hex-grid" x="0" y="0" width="40" height="69.282" patternUnits="userSpaceOnUse">
      <path d="M 40 17.32 L 20 5.77 L 0 17.32 L 0 40.41 L 20 51.96 L 40 40.41 Z M 0 51.96 L -20 40.41 M 20 75.05 L 20 51.96 M 40 51.96 L 60 40.41" stroke="#00f2fe" stroke-width="0.5" opacity="0.05" fill="none"/>
    </pattern>
  </defs>

  <style>
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes sweep { 0% { stroke-dashoffset: 1000; } 100% { stroke-dashoffset: 0; } }
    
    .spin-slow { animation: spin 15s linear infinite; transform-origin: center; }
    .pulse-core { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    
    /* Text Styles */
    .node-title { font-family: 'Fira Code', monospace; font-size: 18px; font-weight: bold; fill: #00f2fe; }
    .node-desc { font-family: 'Outfit', sans-serif; font-size: 14px; fill: #cbd5e1; }
    .node-health { font-family: 'Fira Code', monospace; font-size: 12px; fill: #eab308; }
    
    .line-draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: sweep 3s forwards; }
  </style>

  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="12" stroke="#00f2fe" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect width="100%" height="100%" fill="url(#hex-grid)" rx="12"/>
  
  <text x="30" y="40" font-family="'Fira Code', monospace" font-size="20" fill="#00f2fe" font-weight="900" letter-spacing="2" filter="url(#glow-cyan)">PROJECT.NODES // STARK_NET</text>

  <!-- Clean Data Connections -->
  <g stroke="#00f2fe" stroke-width="2" class="line-draw" fill="none" opacity="0.6">
    <use href="#conn1"/> <use href="#conn2"/> <use href="#conn3"/> <use href="#conn4"/> <use href="#conn5"/>
  </g>

  <!-- Moving Data Packets -->
  <g>
    <circle r="4" fill="#eab308" filter="url(#glow-gold)"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#conn1"/></animateMotion></circle>
    <circle r="4" fill="#00f2fe" filter="url(#glow-cyan)"><animateMotion dur="2.5s" repeatCount="indefinite"><mpath href="#conn2"/></animateMotion></circle>
    <circle r="4" fill="#eab308" filter="url(#glow-gold)"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#conn3"/></animateMotion></circle>
    <circle r="4" fill="#00f2fe" filter="url(#glow-cyan)"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#conn4"/></animateMotion></circle>
    <circle r="4" fill="#eab308" filter="url(#glow-gold)"><animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#conn5"/></animateMotion></circle>
  </g>

  <!-- Central Core (Stark Arc Reactor Style) -->
  <g transform="translate(500, 300)" class="pulse-core">
    <!-- Glowing Aura -->
    <circle cx="0" cy="0" r="70" fill="rgba(0, 242, 254, 0.05)" stroke="#00f2fe" stroke-width="2" filter="url(#glow-cyan)"/>
    <circle cx="0" cy="0" r="55" fill="#020c1b" stroke="#eab308" stroke-width="3" filter="url(#glow-gold)" class="spin-slow" stroke-dasharray="10 20"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#00f2fe" stroke-width="4" stroke-dasharray="30 10 5 10"/>
    
    <text x="0" y="0" font-family="'Outfit', sans-serif" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#glow-cyan)">STARK</text>
    <text x="0" y="15" font-family="'Fira Code', monospace" font-size="10" font-weight="400" fill="#eab308" text-anchor="middle">HUB</text>
  </g>

  <!-- Helper for consistent nodes -->
  <defs>
    <g id="project-node">
      <circle cx="0" cy="0" r="35" fill="#020c1b" stroke="#00f2fe" stroke-width="2" filter="url(#glow-cyan)"/>
      <circle cx="0" cy="0" r="45" fill="none" stroke="#eab308" stroke-width="1.5" stroke-dasharray="10 20" class="spin-slow"/>
    </g>
  </defs>

  <!-- Project 1: saie-ecosystem (Top Left) -->
  <g transform="translate(250, 150)">
    <use href="#project-node"/>
    <text x="0" y="65" class="node-title" text-anchor="middle" filter="url(#glow-cyan)">saie-ecosystem</text>
    <text x="0" y="85" class="node-desc" text-anchor="middle">Self-Healing AI Simulator</text>
    <text x="0" y="105" class="node-health" text-anchor="middle">Health: 100% [NOMINAL]</text>
  </g>

  <!-- Project 2: ARAA (Bottom Left) -->
  <g transform="translate(250, 410)">
    <use href="#project-node"/>
    <text x="0" y="65" class="node-title" text-anchor="middle" filter="url(#glow-cyan)">ARAA</text>
    <text x="0" y="85" class="node-desc" text-anchor="middle">Adversarial Reality Alignment</text>
    <text x="0" y="105" class="node-health" text-anchor="middle">Health: 98% [AUDITING]</text>
  </g>

  <!-- Project 3: Gods-eye-x (Top Right) -->
  <g transform="translate(750, 150)">
    <use href="#project-node"/>
    <text x="0" y="65" class="node-title" text-anchor="middle" filter="url(#glow-cyan)">Gods-eye-x</text>
    <text x="0" y="85" class="node-desc" text-anchor="middle">Intelligence Dashboard</text>
    <text x="0" y="105" class="node-health" text-anchor="middle">Health: 100% [STREAMING]</text>
  </g>

  <!-- Project 4: sudarshana (Bottom Right) -->
  <g transform="translate(750, 410)">
    <use href="#project-node"/>
    <text x="0" y="65" class="node-title" text-anchor="middle" filter="url(#glow-cyan)">sudarshana</text>
    <text x="0" y="85" class="node-desc" text-anchor="middle">Intrusion Detection System</text>
    <text x="0" y="105" class="node-health" text-anchor="middle">Health: 99% [ACTIVE_LOG]</text>
  </g>

  <!-- Project 5: DORA-Dashboard (Top Center) -->
  <g transform="translate(500, 100)">
    <use href="#project-node"/>
    <text x="60" y="0" class="node-title" text-anchor="start" filter="url(#glow-cyan)">DORA-Dashboard</text>
    <text x="60" y="20" class="node-desc" text-anchor="start">DevOps Metrics Engine</text>
    <text x="60" y="40" class="node-health" text-anchor="start">Health: 100% [CALCULATING]</text>
  </g>

</svg>
