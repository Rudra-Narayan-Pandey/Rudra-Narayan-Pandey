<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="100%" height="480">
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="4" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="4" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a192f" />
      <stop offset="100%" stop-color="#020c1b" />
    </linearGradient>
    
    <!-- Mechanical Spider Arms -->
    <path id="arm1" d="M 500 240 L 400 100 L 220 100" fill="none"/>
    <path id="arm2" d="M 500 240 L 400 380 L 220 380" fill="none"/>
    <path id="arm3" d="M 500 240 L 600 100 L 780 100" fill="none"/>
    <path id="arm4" d="M 500 240 L 600 380 L 780 380" fill="none"/>
    <path id="arm5" d="M 500 240 L 500 390" fill="none"/>
    
    <!-- Web Pattern -->
    <pattern id="web" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 100 100 M 100 0 L 0 100" stroke="#ef4444" stroke-width="0.5" opacity="0.1"/>
      <circle cx="50" cy="50" r="40" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.1"/>
      <circle cx="50" cy="50" r="20" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>

  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spin-rev { 100% { transform: rotate(-360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes sweep { 0% { stroke-dashoffset: 1000; } 100% { stroke-dashoffset: 0; } }
    
    .spin-slow { animation: spin 12s linear infinite; transform-origin: center; }
    .spin-fast { animation: spin-rev 6s linear infinite; transform-origin: center; }
    .node-title { font-family: 'Fira Code', monospace; font-size: 16px; font-weight: bold; }
    .node-desc { font-family: 'Outfit', sans-serif; font-size: 13px; fill: #cbd5e1; }
    .node-health { font-family: 'Fira Code', monospace; font-size: 11px; }
    
    .arm-draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: sweep 3s forwards; }
  </style>

  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="12" stroke="#ef4444" stroke-width="2"/>
  <rect width="100%" height="100%" fill="url(#web)" rx="12"/>
  
  <!-- Central Core (Iron Spider Hub) -->
  <g transform="translate(500, 240)">
    <circle cx="0" cy="0" r="60" fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444" stroke-width="3" filter="url(#glow-red)"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#eab308" stroke-width="3" stroke-dasharray="15 10" class="spin-slow" filter="url(#glow-gold)"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#00f2fe" stroke-width="2" stroke-dasharray="30 20 10 10" class="spin-fast" filter="url(#glow-cyan)"/>
    
    <!-- Spidey Emblem -->
    <path d="M -10 -5 L 10 -5 L 15 5 L -15 5 Z" fill="#ef4444"/>
    <path d="M -5 5 L 5 5 L 10 20 L -10 20 Z" fill="#ef4444"/>
    <path d="M -10 -5 L -25 -25 M 10 -5 L 25 -25" stroke="#ef4444" stroke-width="3" fill="none"/>
    <path d="M -15 0 L -35 -10 M 15 0 L 35 -10" stroke="#ef4444" stroke-width="3" fill="none"/>
    <path d="M -15 5 L -35 15 M 15 5 L 35 15" stroke="#ef4444" stroke-width="3" fill="none"/>
    <path d="M -10 15 L -20 35 M 10 15 L 20 35" stroke="#ef4444" stroke-width="3" fill="none"/>
  </g>

  <!-- Mechanical Arms -->
  <g stroke="#eab308" stroke-width="4" class="arm-draw" fill="none" opacity="0.8">
    <use href="#arm1" filter="url(#glow-gold)"/> 
    <use href="#arm2" filter="url(#glow-gold)"/> 
    <use href="#arm3" filter="url(#glow-gold)"/> 
    <use href="#arm4" filter="url(#glow-gold)"/> 
  </g>
  <g stroke="#00f2fe" stroke-width="2" class="arm-draw" fill="none" stroke-dasharray="10 5" opacity="0.6">
    <use href="#arm1"/> <use href="#arm2"/> <use href="#arm3"/> <use href="#arm4"/>
  </g>
  <!-- Center Bottom Web Line -->
  <use href="#arm5" stroke="#ef4444" stroke-width="3" class="arm-draw" opacity="0.8" filter="url(#glow-red)"/>

  <!-- Mechanical Joints -->
  <circle cx="400" cy="100" r="6" fill="#00f2fe" filter="url(#glow-cyan)"/>
  <circle cx="400" cy="380" r="6" fill="#00f2fe" filter="url(#glow-cyan)"/>
  <circle cx="600" cy="100" r="6" fill="#00f2fe" filter="url(#glow-cyan)"/>
  <circle cx="600" cy="380" r="6" fill="#00f2fe" filter="url(#glow-cyan)"/>

  <!-- Energy Pulses -->
  <g>
    <circle r="5" fill="#ef4444" filter="url(#glow-red)"><animateMotion dur="2.5s" repeatCount="indefinite"><mpath href="#arm1"/></animateMotion></circle>
    <circle r="5" fill="#eab308" filter="url(#glow-gold)"><animateMotion dur="3s" repeatCount="indefinite"><mpath href="#arm2"/></animateMotion></circle>
    <circle r="5" fill="#00f2fe" filter="url(#glow-cyan)"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#arm3"/></animateMotion></circle>
    <circle r="5" fill="#ef4444" filter="url(#glow-red)"><animateMotion dur="2.8s" repeatCount="indefinite"><mpath href="#arm4"/></animateMotion></circle>
    <circle r="5" fill="#eab308" filter="url(#glow-gold)"><animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#arm5"/></animateMotion></circle>
  </g>

  <!-- Project 1: saie-ecosystem (Left Top) -->
  <g transform="translate(220, 100)">
    <circle cx="0" cy="0" r="30" fill="#020813" stroke="#ef4444" stroke-width="3" filter="url(#glow-red)"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#eab308" stroke-width="2" stroke-dasharray="10 20" class="spin-slow"/>
    <text x="-50" y="-15" class="node-title" fill="#ef4444" text-anchor="end">saie-ecosystem</text>
    <text x="-50" y="5" class="node-desc" text-anchor="end">Self-Healing AI Simulator</text>
    <text x="-50" y="25" class="node-health" fill="#eab308" text-anchor="end">Health: 100% [NOMINAL]</text>
  </g>

  <!-- Project 2: ARAA (Left Bottom) -->
  <g transform="translate(220, 380)">
    <circle cx="0" cy="0" r="30" fill="#020813" stroke="#00f2fe" stroke-width="3" filter="url(#glow-cyan)"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="30 20" class="spin-fast"/>
    <text x="-50" y="-15" class="node-title" fill="#00f2fe" text-anchor="end">ARAA</text>
    <text x="-50" y="5" class="node-desc" text-anchor="end">Adversarial Reality Alignment</text>
    <text x="-50" y="25" class="node-health" fill="#ef4444" text-anchor="end">Health: 98% [AUDITING]</text>
  </g>

  <!-- Project 3: Gods-eye-x (Right Top) -->
  <g transform="translate(780, 100)">
    <circle cx="0" cy="0" r="30" fill="#020813" stroke="#eab308" stroke-width="3" filter="url(#glow-gold)"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="10 5" class="spin-slow"/>
    <text x="50" y="-15" class="node-title" fill="#eab308" text-anchor="start">Gods-eye-x</text>
    <text x="50" y="5" class="node-desc" text-anchor="start">Intelligence Dashboard</text>
    <text x="50" y="25" class="node-health" fill="#00f2fe" text-anchor="start">Health: 100% [STREAMING]</text>
  </g>

  <!-- Project 4: sudarshana (Right Bottom) -->
  <g transform="translate(780, 380)">
    <circle cx="0" cy="0" r="30" fill="#020813" stroke="#ef4444" stroke-width="3" filter="url(#glow-red)"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#00f2fe" stroke-width="2" stroke-dasharray="50 10" class="spin-fast"/>
    <text x="50" y="-15" class="node-title" fill="#ef4444" text-anchor="start">sudarshana</text>
    <text x="50" y="5" class="node-desc" text-anchor="start">Intrusion Detection System</text>
    <text x="50" y="25" class="node-health" fill="#eab308" text-anchor="start">Health: 99% [ACTIVE_LOG]</text>
  </g>

  <!-- Project 5: DORA-Dashboard (Bottom Center) -->
  <g transform="translate(500, 390)">
    <circle cx="0" cy="0" r="30" fill="#020813" stroke="#00f2fe" stroke-width="3" filter="url(#glow-cyan)"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#eab308" stroke-width="2" stroke-dasharray="5 5" class="spin-slow"/>
    <text x="50" y="5" class="node-title" fill="#00f2fe" text-anchor="start">DORA-Dashboard</text>
    <text x="-50" y="5" class="node-desc" text-anchor="end">DevOps Metrics</text>
    <text x="0" y="60" class="node-health" fill="#eab308" text-anchor="middle">Health: 100% [CALCULATING]</text>
  </g>
  
  <text x="30" y="40" font-family="'Fira Code', monospace" font-size="20" fill="#ef4444" font-weight="900" letter-spacing="2" filter="url(#glow-red)">PROJECT.NODES // IRON_SPIDER</text>
</svg>
