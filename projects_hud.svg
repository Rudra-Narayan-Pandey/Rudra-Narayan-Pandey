<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="400">
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="4" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#071224" />
    </linearGradient>
    <path id="path1" d="M 120 80 L 250 80 L 300 130" fill="none"/>
    <path id="path2" d="M 120 220 L 250 220 L 300 170" fill="none"/>
    <path id="path3" d="M 680 80 L 550 80 L 500 130" fill="none"/>
    <path id="path4" d="M 680 220 L 550 220 L 500 170" fill="none"/>
    <path id="path5" d="M 400 320 L 400 220" fill="none"/>
    <path id="core-connect" d="M 300 130 L 400 170 L 500 130 M 300 170 L 400 200 L 500 170" fill="none"/>
  </defs>

  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spin-rev { 100% { transform: rotate(-360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes sweep { 0% { stroke-dashoffset: 1000; } 100% { stroke-dashoffset: 0; } }
    
    .spin-slow { animation: spin 10s linear infinite; transform-origin: center; }
    .spin-fast { animation: spin-rev 5s linear infinite; transform-origin: center; }
    .node-text { font-family: 'Fira Code', monospace; font-size: 14px; font-weight: bold; }
    .desc-text { font-family: 'Outfit', sans-serif; font-size: 11px; fill: #cbd5e1; }
    
    .line-draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: sweep 3s forwards; }
  </style>

  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- Central Core (Dashboard Hub) -->
  <g transform="translate(400, 150)">
    <circle cx="0" cy="0" r="50" fill="rgba(0, 242, 254, 0.1)" stroke="#00f2fe" stroke-width="2" filter="url(#glow-cyan)"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#39ff14" stroke-width="2" stroke-dasharray="10 5" class="spin-slow" filter="url(#glow-green)"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="20 40 10 20" class="spin-fast"/>
    <text x="0" y="5" font-family="'Fira Code', monospace" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle" filter="url(#glow-cyan)">HUB</text>
  </g>

  <!-- Network Lines -->
  <g stroke="#1e3a8a" stroke-width="2" class="line-draw">
    <use href="#path1" /> <use href="#path2" /> <use href="#path3" /> <use href="#path4" /> <use href="#path5" />
    <use href="#core-connect" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 4" style="animation: pulse 2s infinite;"/>
  </g>

  <!-- Data Packets -->
  <g>
    <circle r="4" fill="#39ff14" filter="url(#glow-green)"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#path1"/></animateMotion></circle>
    <circle r="4" fill="#00f2fe" filter="url(#glow-cyan)"><animateMotion dur="2.5s" repeatCount="indefinite"><mpath href="#path2"/></animateMotion></circle>
    <circle r="4" fill="#39ff14" filter="url(#glow-green)"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#path3"/></animateMotion></circle>
    <circle r="4" fill="#eab308" filter="url(#glow-cyan)"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#path4"/></animateMotion></circle>
    <circle r="4" fill="#ef4444" filter="url(#glow-red)"><animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#path5"/></animateMotion></circle>
  </g>

  <!-- Project 1: saie-ecosystem -->
  <g transform="translate(120, 80)">
    <circle cx="0" cy="0" r="25" fill="#020617" stroke="#39ff14" stroke-width="2" filter="url(#glow-green)"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#39ff14" stroke-width="1" stroke-dasharray="15 10" class="spin-slow"/>
    <text x="-35" y="-15" class="node-text" fill="#39ff14" text-anchor="end">saie-ecosystem</text>
    <text x="-35" y="0" class="desc-text" text-anchor="end">Self-Healing AI Simulator</text>
    <text x="-35" y="15" font-family="'Fira Code', monospace" font-size="10" fill="#00f2fe" text-anchor="end">Health: 100% [SECURE]</text>
  </g>

  <!-- Project 2: ARAA -->
  <g transform="translate(120, 220)">
    <circle cx="0" cy="0" r="25" fill="#020617" stroke="#39ff14" stroke-width="2" filter="url(#glow-green)"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#39ff14" stroke-width="1" stroke-dasharray="30 20" class="spin-fast"/>
    <text x="-35" y="-15" class="node-text" fill="#39ff14" text-anchor="end">ARAA</text>
    <text x="-35" y="0" class="desc-text" text-anchor="end">Adversarial Reality Alignment</text>
    <text x="-35" y="15" font-family="'Fira Code', monospace" font-size="10" fill="#00f2fe" text-anchor="end">Health: 98% [AUDITING]</text>
  </g>

  <!-- Project 3: Gods-eye-x -->
  <g transform="translate(680, 80)">
    <circle cx="0" cy="0" r="25" fill="#020617" stroke="#39ff14" stroke-width="2" filter="url(#glow-green)"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#39ff14" stroke-width="1" stroke-dasharray="10 5" class="spin-slow"/>
    <text x="35" y="-15" class="node-text" fill="#39ff14" text-anchor="start">Gods-eye-x</text>
    <text x="35" y="0" class="desc-text" text-anchor="start">Intelligence Dashboard</text>
    <text x="35" y="15" font-family="'Fira Code', monospace" font-size="10" fill="#00f2fe" text-anchor="start">Health: 100% [STREAMING]</text>
  </g>

  <!-- Project 4: sudarshana -->
  <g transform="translate(680, 220)">
    <circle cx="0" cy="0" r="25" fill="#020617" stroke="#39ff14" stroke-width="2" filter="url(#glow-green)"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#39ff14" stroke-width="1" stroke-dasharray="50 10" class="spin-fast"/>
    <text x="35" y="-15" class="node-text" fill="#39ff14" text-anchor="start">sudarshana</text>
    <text x="35" y="0" class="desc-text" text-anchor="start">Intrusion Detection System</text>
    <text x="35" y="15" font-family="'Fira Code', monospace" font-size="10" fill="#00f2fe" text-anchor="start">Health: 99% [ACTIVE_LOG]</text>
  </g>

  <!-- Project 5: DORA-Dashboard -->
  <g transform="translate(400, 320)">
    <circle cx="0" cy="0" r="25" fill="#020617" stroke="#39ff14" stroke-width="2" filter="url(#glow-green)"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#39ff14" stroke-width="1" stroke-dasharray="5 5" class="spin-slow"/>
    <text x="40" y="5" class="node-text" fill="#39ff14" text-anchor="start">DORA-Dashboard</text>
    <text x="-40" y="5" class="desc-text" text-anchor="end">DevOps Metrics Engine</text>
    <text x="0" y="55" font-family="'Fira Code', monospace" font-size="10" fill="#00f2fe" text-anchor="middle">Health: 100% [CALCULATING]</text>
  </g>
  
  <text x="20" y="30" font-family="'Fira Code', monospace" font-size="16" fill="#00f2fe" font-weight="900" letter-spacing="2" filter="url(#glow-cyan)">PROJECT.NODES // ACTIVE</text>
</svg>
