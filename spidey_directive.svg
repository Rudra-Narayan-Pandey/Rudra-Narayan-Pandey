<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="280">
  <defs>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="spidey-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a192f" />
      <stop offset="70%" stop-color="#050a15" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <clipPath id="type1"><rect x="0" y="0" height="20" width="0"><animate attributeName="width" values="0; 800" dur="1s" fill="freeze" /></rect></clipPath>
    <clipPath id="type2"><rect x="0" y="30" height="40" width="0"><animate attributeName="width" values="0; 0; 800" keyTimes="0; 0.2; 1" dur="2.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type3"><rect x="0" y="80" height="40" width="0"><animate attributeName="width" values="0; 0; 800" keyTimes="0; 0.4; 1" dur="3.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type4"><rect x="0" y="130" height="40" width="0"><animate attributeName="width" values="0; 0; 800" keyTimes="0; 0.6; 1" dur="4.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type5"><rect x="0" y="180" height="40" width="0"><animate attributeName="width" values="0; 0; 800" keyTimes="0; 0.8; 1" dur="5.5s" fill="freeze" /></rect></clipPath>
  </defs>

  <style>
    .text-body { font-family: 'Fira Code', monospace; font-size: 13px; fill: #e2e8f0; }
    .text-highlight { fill: #ef4444; font-weight: bold; }
    .text-blue { fill: #3b82f6; font-weight: bold; }
    @keyframes web-swing {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(5deg); }
      100% { transform: rotate(0deg); }
    }
    .swinging { animation: web-swing 4s ease-in-out infinite; transform-origin: top center; }
  </style>

  <rect width="100%" height="100%" fill="url(#spidey-bg)" rx="10" stroke="#ef4444" stroke-width="3" stroke-dasharray="20 10"/>
  
  <g class="swinging">
    <!-- Hanging Web Background Graphic -->
    <path d="M 700 0 L 700 120" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <circle cx="700" cy="120" r="15" fill="none" stroke="#ef4444" stroke-width="3" filter="url(#glow-red)" opacity="0.8"/>
    <!-- Tiny spider symbol -->
    <path d="M 697 115 L 703 115 M 697 125 L 703 125 M 700 115 L 700 125" stroke="#ef4444" stroke-width="2" filter="url(#glow-red)"/>
  </g>

  <!-- Hacker Spidey Text -->
  <g transform="translate(30, 40)" class="text-body">
    <!-- Header -->
    <text y="0" font-size="18" fill="#ef4444" font-weight="900" filter="url(#glow-red)" clip-path="url(#type1)">[WEB-SLINGER THREAT MITIGATOR]</text>
    <line x1="0" y1="10" x2="360" y2="10" stroke="#ef4444" stroke-width="2" clip-path="url(#type1)"/>
    
    <!-- Paragraph 1 -->
    <g clip-path="url(#type2)">
      <text y="40">I am a <tspan class="text-blue">friendly neighborhood</tspan> Cybersecurity Engineer and Infrastructure Developer specializing in</text>
      <text y="58">VAPT, Cloud Security Architecture, and SIEM/SOC automation.</text>
    </g>

    <!-- Paragraph 2 -->
    <g clip-path="url(#type3)">
      <text y="90">Based at VIT Vellore, my operational focus is <tspan class="text-highlight">webbing up defenses</tspan>, identifying weaknesses,</text>
      <text y="108">and aggressively mitigating threats across complex software ecosystems.</text>
    </g>

    <!-- Paragraph 3 -->
    <g clip-path="url(#type4)">
      <text y="140">I build <tspan class="text-blue">bulletproof</tspan> defensive testbeds, deploy heavy-duty security configuration benchmarks,</text>
      <text y="158">and develop tools to harden multi-agent cloud systems against adversarial bypasses.</text>
    </g>

    <!-- WEB BUGS line -->
    <g clip-path="url(#type5)">
      <text y="205" font-size="24" font-weight="900" fill="#ef4444" filter="url(#glow-red)">> I DON'T JUST PATCH SYSTEMS... I WEB THEM UP.</text>
    </g>
  </g>
  
  <line x1="0" y1="0" x2="800" y2="0" stroke="rgba(59, 130, 246, 0.3)" stroke-width="3">
     <animateTransform attributeName="transform" type="translate" values="0,0; 0,280; 0,0" dur="2s" repeatCount="indefinite" />
  </line>
</svg>
