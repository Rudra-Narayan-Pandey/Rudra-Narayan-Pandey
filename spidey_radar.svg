<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <defs>
    <filter id="glow-red" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <radialGradient id="radar-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="70%" stop-color="#0a192f" />
      <stop offset="100%" stop-color="#050a15" />
    </radialGradient>
  </defs>

  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spin-rev { 100% { transform: rotate(-360deg); } }
    @keyframes pulse-sense { 
      0% { transform: scale(0.8); opacity: 0.8; } 
      50% { transform: scale(1.1); opacity: 1; stroke: #ef4444; } 
      100% { transform: scale(0.8); opacity: 0.8; } 
    }
    @keyframes scan {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .ring-slow { animation: spin 10s linear infinite; transform-origin: 130px 130px; }
    .spider-sense { animation: pulse-sense 1.5s ease-in-out infinite; transform-origin: 130px 130px; }
    .radar-scan { animation: scan 4s linear infinite; transform-origin: 130px 130px; }
    .hud-text { font-family: 'Fira Code', monospace; font-size: 9px; fill: #ef4444; }
  </style>

  <!-- Deep Blue/Black Background -->
  <rect width="100%" height="100%" fill="url(#radar-bg)" rx="12" stroke="#ef4444" stroke-width="2"/>
  
  <g>
    <!-- Outer Web Rings (Blue) -->
    <circle cx="130" cy="130" r="115" fill="none" stroke="#3b82f6" stroke-width="2" class="ring-slow" stroke-dasharray="10 10 40 10" filter="url(#glow-blue)" opacity="0.6"/>
    <circle cx="130" cy="130" r="95" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.8"/>
    
    <!-- Radar Grid / Webbing -->
    <path d="M 130 15 L 130 245 M 15 130 L 245 130 M 48 48 L 212 212 M 48 212 L 212 48" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
    <circle cx="130" cy="130" r="70" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
    <circle cx="130" cy="130" r="45" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Radar Scanner Line -->
    <g class="radar-scan">
      <path d="M 130 130 L 130 15" stroke="#ef4444" stroke-width="2" filter="url(#glow-red)"/>
      <path d="M 130 130 L 130 15 A 115 115 0 0 1 200 35 Z" fill="rgba(239, 68, 68, 0.1)" />
    </g>
    
    <!-- Inner Spidey Core -->
    <g class="spider-sense">
      <circle cx="130" cy="130" r="35" fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444" stroke-width="3" filter="url(#glow-red)"/>
      
      <!-- Classic Spider Logo -->
      <g fill="#ef4444" transform="translate(130, 130) scale(0.6)">
        <!-- Abdomen and Head -->
        <path d="M -15 -10 C -15 -30, 15 -30, 15 -10 C 15 10, 10 30, 0 35 C -10 30, -15 10, -15 -10 Z" />
        <circle cx="0" cy="-20" r="8" />
        <!-- Legs Top Left -->
        <path d="M -8 -15 L -25 -35 L -45 -30 L -40 -25 L -20 -28 L -5 -10 Z" />
        <path d="M -10 -5 L -35 -15 L -55 0 L -50 5 L -30 -10 L -5 0 Z" />
        <!-- Legs Bottom Left -->
        <path d="M -10 10 L -30 25 L -40 50 L -35 55 L -25 35 L -5 15 Z" />
        <path d="M -5 20 L -20 45 L -20 70 L -15 70 L -15 50 L 0 25 Z" />
        <!-- Legs Top Right -->
        <path d="M 8 -15 L 25 -35 L 45 -30 L 40 -25 L 20 -28 L 5 -10 Z" />
        <path d="M 10 -5 L 35 -15 L 55 0 L 50 5 L 30 -10 L 5 0 Z" />
        <!-- Legs Bottom Right -->
        <path d="M 10 10 L 30 25 L 40 50 L 35 55 L 25 35 L 5 15 Z" />
        <path d="M 5 20 L 20 45 L 20 70 L 15 70 L 15 50 L 0 25 Z" />
      </g>
    </g>
  </g>

  <!-- Spidey HUD Diagnostics -->
  <text x="10" y="20" class="hud-text" filter="url(#glow-red)">SPIDER_OS.v4</text>
  <text x="10" y="32" class="hud-text" fill="#3b82f6">SENSE: ACTIVE</text>
  <text x="10" y="245" class="hud-text" fill="#ef4444" filter="url(#glow-red)">THREAT: DETECTED</text>
  
  <!-- Threat Blips -->
  <circle cx="180" cy="80" r="4" fill="#ef4444" filter="url(#glow-red)"><animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="80" cy="190" r="4" fill="#ef4444" filter="url(#glow-red)"><animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/></circle>

</svg>
