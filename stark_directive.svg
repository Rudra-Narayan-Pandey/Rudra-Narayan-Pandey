<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 280" width="100%" height="280">
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="stark-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#020c1b" />
      <stop offset="70%" stop-color="#0a192f" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <clipPath id="type1"><rect x="0" y="0" height="25" width="0"><animate attributeName="width" values="0; 850" dur="1s" fill="freeze" /></rect></clipPath>
    <clipPath id="type2"><rect x="0" y="30" height="40" width="0"><animate attributeName="width" values="0; 0; 850" keyTimes="0; 0.2; 1" dur="2.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type3"><rect x="0" y="80" height="40" width="0"><animate attributeName="width" values="0; 0; 850" keyTimes="0; 0.4; 1" dur="3.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type4"><rect x="0" y="130" height="40" width="0"><animate attributeName="width" values="0; 0; 850" keyTimes="0; 0.6; 1" dur="4.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type5"><rect x="0" y="190" height="40" width="0"><animate attributeName="width" values="0; 0; 850" keyTimes="0; 0.8; 1" dur="5.5s" fill="freeze" /></rect></clipPath>
  </defs>

  <style>
    .text-body { font-family: 'Fira Code', Consolas, monospace; font-size: 14px; fill: #cbd5e1; }
    .text-highlight { fill: #00f2fe; font-weight: 600; }
    .text-gold { fill: #eab308; font-weight: 600; }
  </style>

  <rect width="100%" height="100%" fill="url(#stark-bg)" rx="8" stroke="#00f2fe" stroke-width="1.5" stroke-opacity="0.4"/>
  
  <g transform="translate(35, 40)" class="text-body">
    <!-- Header -->
    <text y="0" font-size="16" fill="#00f2fe" font-weight="700" filter="url(#glow-cyan)" clip-path="url(#type1)">[STARK_NET THREAT MITIGATION PROTOCOL]</text>
    <line x1="0" y1="12" x2="330" y2="12" stroke="#00f2fe" stroke-width="1" opacity="0.6" clip-path="url(#type1)"/>
    
    <!-- Paragraph 1 -->
    <g clip-path="url(#type2)">
      <text y="40">I am a Cybersecurity Engineer and Infrastructure Developer specializing in</text>
      <text y="60"><tspan class="text-gold">VAPT, Cloud Security Architecture, and SIEM/SOC automation.</tspan></text>
    </g>

    <!-- Paragraph 2 -->
    <g clip-path="url(#type3)">
      <text y="100">Based at VIT Vellore, my operational focus lies in identifying, logging,</text>
      <text y="120">and <tspan class="text-highlight">mitigating zero-day threats</tspan> across complex software ecosystems.</text>
    </g>

    <!-- Paragraph 3 -->
    <g clip-path="url(#type4)">
      <text y="160">I design defensive testbeds, deploy security configuration benchmarks,</text>
      <text y="180">and develop tools to harden multi-agent cloud systems against adversarial bypasses.</text>
    </g>

    <!-- Professional Sign off -->
    <g clip-path="url(#type5)">
      <text y="225" font-size="20" font-weight="800" fill="#00f2fe" filter="url(#glow-cyan)">> ENGINEERING SECURE ECOSYSTEMS. NEUTRALIZING THREATS.</text>
    </g>
  </g>
  
  <line x1="0" y1="0" x2="850" y2="0" stroke="rgba(0, 242, 254, 0.2)" stroke-width="2">
     <animateTransform attributeName="transform" type="translate" values="0,0; 0,280; 0,0" dur="4s" repeatCount="indefinite" />
  </line>
</svg>
