<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <defs>
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-core" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="reactor-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#020c1b" />
      <stop offset="70%" stop-color="#0a192f" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
  </defs>

  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spin-rev { 100% { transform: rotate(-360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } }
    
    .spin-slow { animation: spin 15s linear infinite; transform-origin: 130px 130px; }
    .spin-fast { animation: spin-rev 8s linear infinite; transform-origin: 130px 130px; }
    .pulse-core { animation: pulse 3s ease-in-out infinite; transform-origin: 130px 130px; }
    
    .text-hud { font-family: 'Outfit', 'Segoe UI', sans-serif; font-size: 8px; fill: #00f2fe; letter-spacing: 2px; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#reactor-bg)" rx="12" stroke="#00f2fe" stroke-width="1.5" stroke-opacity="0.5"/>
  
  <g class="pulse-core">
    <!-- Outer Rings -->
    <circle cx="130" cy="130" r="110" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.3"/>
    <circle cx="130" cy="130" r="100" fill="none" stroke="#00f2fe" stroke-width="3" stroke-dasharray="2 6" class="spin-slow" filter="url(#glow-cyan)"/>
    <circle cx="130" cy="130" r="85" fill="none" stroke="#00f2fe" stroke-width="8" stroke-opacity="0.1"/>
    
    <!-- Copper Coils (represented as gold/cyan hashes) -->
    <circle cx="130" cy="130" r="75" fill="none" stroke="#00f2fe" stroke-width="8" stroke-dasharray="5 15" class="spin-fast" filter="url(#glow-cyan)"/>
    
    <!-- Inner Geometric Core -->
    <g stroke="#ffffff" stroke-width="1.5" fill="none" filter="url(#glow-cyan)" opacity="0.8">
      <polygon points="130,50 200,90 200,170 130,210 60,170 60,90" class="spin-slow"/>
      <polygon points="130,70 182,100 182,160 130,190 78,160 78,100" class="spin-rev"/>
    </g>

    <!-- Glowing Center -->
    <circle cx="130" cy="130" r="35" fill="#ffffff" filter="url(#glow-core)"/>
    <circle cx="130" cy="130" r="25" fill="#e0ffff" filter="url(#glow-cyan)"/>
    <circle cx="130" cy="130" r="15" fill="#ffffff"/>
  </g>

  <!-- HUD Text Elements -->
  <text x="130" y="20" class="text-hud" text-anchor="middle" filter="url(#glow-cyan)">STARK INDUSTRIES</text>
  <text x="130" y="250" class="text-hud" text-anchor="middle">J.A.R.V.I.S. // ONLINE</text>
  
  <line x1="20" y1="130" x2="40" y2="130" stroke="#00f2fe" stroke-width="1" opacity="0.5"/>
  <line x1="220" y1="130" x2="240" y2="130" stroke="#00f2fe" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="20" x2="130" y2="40" stroke="#00f2fe" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="220" x2="130" y2="240" stroke="#00f2fe" stroke-width="1" opacity="0.5"/>
</svg>
