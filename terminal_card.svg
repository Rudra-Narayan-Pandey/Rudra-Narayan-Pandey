<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 260" width="100%" height="260">
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <clipPath id="type1"><rect x="0" y="0" height="20"><animate attributeName="width" values="0; 550" dur="1s" fill="freeze" /></rect></clipPath>
    <clipPath id="type2"><rect x="0" y="20" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.15; 1" dur="1.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type3"><rect x="0" y="40" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.3; 1" dur="2s" fill="freeze" /></rect></clipPath>
    <clipPath id="type4"><rect x="0" y="60" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.45; 1" dur="2.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type5"><rect x="0" y="80" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.6; 1" dur="3s" fill="freeze" /></rect></clipPath>
    <clipPath id="type6"><rect x="0" y="100" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.75; 1" dur="3.5s" fill="freeze" /></rect></clipPath>
    
    <clipPath id="type7"><rect x="0" y="150" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.85; 1" dur="4s" fill="freeze" /></rect></clipPath>
    <clipPath id="type8"><rect x="0" y="170" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.9; 1" dur="4.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type9"><rect x="0" y="190" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.95; 1" dur="5s" fill="freeze" /></rect></clipPath>
  </defs>

  <style>
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .cursor { animation: blink 1s infinite; fill: #00f2fe; filter: url(#glow-cyan); }
    .text-base { font-family: 'Fira Code', Consolas, monospace; font-size: 14px; font-weight: 600; }
  </style>

  <!-- Deep Blue Stark Background -->
  <rect width="100%" height="100%" fill="rgba(10, 25, 47, 0.8)" rx="8" stroke="#00f2fe" stroke-width="1.5"/>
  
  <g transform="translate(20, 20)" class="text-base">
    <text y="15" fill="#e2e8f0" clip-path="url(#type1)">⚡ PROTOCOL        : <tspan fill="#eab308" filter="url(#glow-gold)">PROJECT_IRON_SPIDER</tspan></text>
    <text y="35" fill="#e2e8f0" clip-path="url(#type2)">⚡ OPERATIVE       : <tspan fill="#00f2fe">RUDRA NARAYAN PANDEY</tspan></text>
    <text y="55" fill="#e2e8f0" clip-path="url(#type3)">⚡ CLEARANCE       : <tspan fill="#ef4444" filter="url(#glow-red)">STARK_INDUSTRIES_LEVEL_10</tspan></text>
    <text y="75" fill="#e2e8f0" clip-path="url(#type4)">⚡ CORE FOCUS      : CYBER_SECURITY | VAPT | DEVSECOPS</text>
    <text y="95" fill="#e2e8f0" clip-path="url(#type5)">⚡ SYSTEM NODE     : VIT_VELLORE // B.TECH CSE</text>
    <text y="115" fill="#e2e8f0" clip-path="url(#type6)">⚡ A.I. STATUS     : <tspan fill="#00f2fe" filter="url(#glow-cyan)">J.A.R.V.I.S. ONLINE</tspan></text>
    
    <!-- Security Checks -->
    <text y="165" fill="#eab308" font-weight="bold" clip-path="url(#type7)">[J.A.R.V.I.S.] WELCOME BACK, SIR. SUIT SYSTEMS NOMINAL.</text>
    <text y="185" fill="#00f2fe" font-weight="bold" clip-path="url(#type8)">[J.A.R.V.I.S.] ESTABLISHING SECURE STARK_NET UPLINK...</text>
    <text y="205" fill="#ef4444" font-weight="bold" filter="url(#glow-red)" clip-path="url(#type9)">[J.A.R.V.I.S.] WARNING: THREAT DETECTED. ACTIVATING INSTANT KILL MODE.</text>

    <!-- Moving Cursor -->
    <rect x="0" y="215" width="10" height="15" class="cursor">
       <animate attributeName="opacity" values="0; 0; 1" keyTimes="0; 0.99; 1" dur="5.1s" fill="freeze" />
       <animate attributeName="x" values="0; 0; 430" keyTimes="0; 0.99; 1" dur="5s" fill="freeze" />
    </rect>
  </g>
  
  <line x1="0" y1="0" x2="550" y2="0" stroke="rgba(0, 242, 254, 0.3)" stroke-width="2">
     <animateTransform attributeName="transform" type="translate" values="0,0; 0,260; 0,0" dur="3s" repeatCount="indefinite" />
  </line>
</svg>
