<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 260" width="100%" height="260">
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <clipPath id="type1"><rect x="0" y="0" height="20" width="0"><animate attributeName="width" values="0; 550" dur="0.8s" fill="freeze" /></rect></clipPath>
    <clipPath id="type2"><rect x="0" y="25" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.15; 1" dur="1.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type3"><rect x="0" y="50" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.3; 1" dur="2s" fill="freeze" /></rect></clipPath>
    <clipPath id="type4"><rect x="0" y="75" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.45; 1" dur="2.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type5"><rect x="0" y="100" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.6; 1" dur="3s" fill="freeze" /></rect></clipPath>
    
    <clipPath id="type6"><rect x="0" y="150" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.75; 1" dur="3.5s" fill="freeze" /></rect></clipPath>
    <clipPath id="type7"><rect x="0" y="175" height="20" width="0"><animate attributeName="width" values="0; 0; 550" keyTimes="0; 0.85; 1" dur="4s" fill="freeze" /></rect></clipPath>
  </defs>

  <style>
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .cursor { animation: blink 1s infinite; fill: #00f2fe; filter: url(#glow-cyan); }
    .text-base { font-family: 'Fira Code', Consolas, monospace; font-size: 15px; font-weight: 500; }
  </style>

  <!-- Deep Stark Blue Background -->
  <rect width="100%" height="100%" fill="rgba(2, 12, 27, 0.9)" rx="8" stroke="#00f2fe" stroke-width="1.5" stroke-opacity="0.6"/>
  
  <g transform="translate(25, 25)" class="text-base">
    <text y="15" fill="#94a3b8" clip-path="url(#type1)">[+] IDENTITY      : <tspan fill="#eab308" filter="url(#glow-gold)">RUDRA NARAYAN PANDEY</tspan></text>
    <text y="40" fill="#94a3b8" clip-path="url(#type2)">[+] DESIGNATION   : CLOUD SECURITY ARCHITECT &amp; VAPT ENGINEER</text>
    <text y="65" fill="#94a3b8" clip-path="url(#type3)">[+] CLEARANCE     : <tspan fill="#00f2fe" filter="url(#glow-cyan)">STARK_INDUSTRIES // LEVEL 9</tspan></text>
    <text y="90" fill="#94a3b8" clip-path="url(#type4)">[+] BASE OF OPS   : VIT_VELLORE, B.TECH CSE</text>
    <text y="115" fill="#94a3b8" clip-path="url(#type5)">[+] A.I. SYSTEM   : <tspan fill="#eab308">J.A.R.V.I.S. SECURE_BOOT ONLINE</tspan></text>
    
    <!-- Security Checks -->
    <text y="165" fill="#00f2fe" font-weight="600" clip-path="url(#type6)">> J.A.R.V.I.S: SYSTEM INTEGRITY AT 100%.</text>
    <text y="190" fill="#00f2fe" font-weight="600" clip-path="url(#type7)">> J.A.R.V.I.S: ZERO-TRUST PROTOCOLS ENGAGED.</text>

    <!-- Moving Cursor -->
    <rect x="0" y="205" width="12" height="18" class="cursor">
       <animate attributeName="opacity" values="0; 0; 1" keyTimes="0; 0.99; 1" dur="4.2s" fill="freeze" />
       <animate attributeName="x" values="0; 0; 350" keyTimes="0; 0.99; 1" dur="4.1s" fill="freeze" />
    </rect>
  </g>
  
  <line x1="0" y1="0" x2="550" y2="0" stroke="rgba(0, 242, 254, 0.2)" stroke-width="2">
     <animateTransform attributeName="transform" type="translate" values="0,0; 0,260; 0,0" dur="4s" repeatCount="indefinite" />
  </line>
</svg>
